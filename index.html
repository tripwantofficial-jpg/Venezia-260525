<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --bg:#ffffff;
    --bg-2:#f5f5f7;
    --ink:#1d1d1f;
    --ink-2:#6e6e73;
    --ink-3:#86868b;
    --line:#e3e3e6;
    --line-2:#d2d2d7;
    --blue:#0071e3;
    --sight:#c0911f;
    --night:#2f6fb0;
    --food:#d1452b;
    --drink:#9c3b5e;
    --etc:#2f8f7f;
    --radius:18px;
    --shadow:0 1px 3px rgba(0,0,0,.04), 0 8px 24px -8px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Apple SD Gothic Neo","Helvetica Neue","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;
    letter-spacing:-.01em;
  }
  .wrap{max-width:600px;margin:0 auto;background:var(--bg)}

  /* ---------- Header ---------- */
  header{
    text-align:center;padding:46px 22px 26px;
  }
  header .kicker{
    font-size:.8rem;font-weight:600;letter-spacing:.02em;color:var(--ink-3);
    text-transform:uppercase;margin-bottom:8px;
  }
  header h1{
    font-size:clamp(2.05rem,7.6vw,2.8rem);font-weight:700;letter-spacing:-.03em;line-height:1.12;word-break:keep-all;
  }
  header .hashtag{
    margin-top:10px;font-size:.75rem;font-weight:600;color:var(--blue);letter-spacing:.005em;line-height:1.55;max-width:320px;margin-left:auto;margin-right:auto;word-break:keep-all;
  }
  header p{margin-top:13px;color:var(--ink-2);font-size:.88rem;font-weight:400;line-height:1.55;max-width:440px;margin-left:auto;margin-right:auto}
  header p .updated{display:inline-block;margin-top:9px;font-size:.74rem;color:var(--ink-3);opacity:.8}

  /* ---------- Sticky: tabs + map ---------- */
  .sticky-top{
    position:sticky;top:0;z-index:40;
    background:rgba(255,255,255,.82);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line);
  }
  .tabs{
    display:flex;gap:3px;overflow-x:auto;
    padding:9px 8px;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:1 1 auto;font-family:inherit;font-size:.74rem;font-weight:600;
    color:var(--tc,#1d1d1f);background:var(--bg-2);border:none;
    padding:7px 4px;border-radius:980px;cursor:pointer;white-space:nowrap;
    transition:.2s;display:flex;align-items:center;justify-content:center;gap:3px;letter-spacing:-.02em;
  }
  .tab .count{font-size:.64rem;font-weight:500;opacity:.55;font-variant-numeric:tabular-nums}
  .tab-star{color:#f0a500;font-size:.98rem;line-height:1}
  .tab.active .tab-star{color:#f0a500}
  .tab.active{background:var(--ink);color:#fff}
  .tab.active .count{color:#fff;opacity:.6}
  .tab:active{transform:scale(.94)}

  .map-panel{padding:12px 16px 14px;position:relative}
  #map{
    width:100%;height:38vh;min-height:230px;max-height:380px;
    border-radius:14px;border:1px solid var(--line-2);
    background:#e8e8ea;overflow:hidden;
    box-shadow:var(--shadow);
  }
  .leaflet-container{font-family:inherit;background:#e8e8ea}
  .leaflet-tile-pane{filter:saturate(.96) brightness(1.01)}
  .legend{
    position:absolute;right:26px;top:22px;z-index:600;
    background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;
    font-size:.7rem;color:var(--ink-2);box-shadow:var(--shadow);
  }
  .legend .lg{display:flex;align-items:center;gap:6px;margin:2.5px 0;white-space:nowrap}
  .legend .lg i{width:8px;height:8px;border-radius:50%;flex:0 0 auto}

  /* 내 위치 */
  .locate-btn{
    width:38px;height:38px;border:1px solid var(--line-2);background:#fff;
    border-radius:10px;font-size:1.05rem;cursor:pointer;line-height:1;
    box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
    transition:.2s;
  }
  .locate-btn.on{background:var(--blue);filter:none}
  .locate-btn.on .pin-emoji{filter:grayscale(1) brightness(3)}
  .me-dot{
    width:16px;height:16px;border-radius:50%;
    background:#1a73e8;border:3px solid #fff;
    box-shadow:0 0 0 4px rgba(26,115,232,.30),0 1px 5px rgba(0,0,0,.35);
    animation:mepulse 1.8s ease-in-out infinite;
  }
  @keyframes mepulse{0%,100%{box-shadow:0 0 0 4px rgba(26,115,232,.30),0 1px 5px rgba(0,0,0,.35)}50%{box-shadow:0 0 0 9px rgba(26,115,232,.12),0 1px 5px rgba(0,0,0,.35)}}50%{opacity:.18}}

  /* ---------- Section heading ---------- */
  .sec-head{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:20px 20px 6px;
  }
  .sec-head h2{font-size:1.35rem;font-weight:700;letter-spacing:-.02em}
  .sec-head .cnt{font-size:.85rem;color:var(--ink-3);font-weight:500}

  /* ---------- Cards (가로형) ---------- */
  .cards{padding:8px 16px 48px;display:flex;flex-direction:column;gap:11px}
  .empty-mp{padding:46px 24px;text-align:center;color:var(--ink-3);font-size:.92rem;line-height:1.65}
  .empty-mp .big{font-size:1.9rem;display:block;margin-bottom:10px}
  .card{
    position:relative;display:grid;grid-template-columns:104px 1fr;
    background:var(--bg);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s;
    animation:fade .4s both;
  }
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card:active{transform:scale(.99)}
  @media(hover:hover){.card:hover{box-shadow:0 2px 6px rgba(0,0,0,.05),0 12px 28px -10px rgba(0,0,0,.15)}}
  .thumb{position:relative;background:var(--bg-2);overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb.noimg{background:linear-gradient(135deg,#ededf0,#f7f7f9)}
  .thumb.noimg::after{
    content:attr(data-ch);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:2.2rem;font-weight:700;color:rgba(0,0,0,.12);
  }
  .cat-tag{
    position:absolute;top:7px;left:7px;
    font-size:.6rem;font-weight:600;color:#fff;
    padding:3px 7px;border-radius:980px;
    background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  }
  .cat-tag i{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .pin-flag{
    position:absolute;bottom:7px;left:7px;font-size:.58rem;font-weight:600;color:#fff;
    padding:3px 6px;border-radius:980px;background:rgba(209,69,43,.92);backdrop-filter:blur(4px);
  }
  .body{padding:11px 13px 12px 14px;min-width:0}
  .name{font-size:1.02rem;font-weight:700;letter-spacing:-.02em;line-height:1.22;padding-right:32px}
  .name .ko{display:block;font-size:.76rem;font-weight:400;color:var(--ink-3);margin-top:1px;letter-spacing:-.01em}
  .stat{display:flex;align-items:center;flex-wrap:wrap;gap:4px 9px;margin:6px 0;font-size:.8rem;color:var(--ink-2)}
  .stat .star{color:#e8a317;font-weight:600}
  .stat .star b{color:var(--ink);font-weight:600}
  .stat .price{color:var(--etc);font-weight:600;letter-spacing:.03em}
  .stat .sep{color:var(--line-2)}
  .note{font-size:.83rem;color:var(--ink-2);line-height:1.5}
  .hours{margin-top:6px;font-size:.74rem;color:var(--ink-3);display:flex;align-items:flex-start;gap:5px}
  .hours.warn{color:var(--food)}
  .hours svg{flex:0 0 auto;margin-top:2px;opacity:.8}
  .gmap{
    display:inline-flex;align-items:center;gap:4px;margin-top:9px;
    font-size:.82rem;font-weight:500;color:var(--blue);text-decoration:none;
  }
  .gmap:active{opacity:.6}
  /* My Point 별 버튼 */
  .star-btn{
    position:absolute;top:8px;right:8px;z-index:5;
    width:30px;height:30px;border:none;background:rgba(255,255,255,.88);
    border-radius:50%;cursor:pointer;font-size:.95rem;line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 5px rgba(0,0,0,.16);transition:transform .15s,background .2s,color .2s;color:#c4c4c9;
  }
  .star-btn:active{transform:scale(.82)}
  .star-btn.on{background:#fff3d4;color:#f0a500}


  /* Leaflet pins & popup */
  .pin{
    width:19px;height:19px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35);transition:transform .2s;
  }
  .pin::after{content:"";position:absolute;top:5px;left:5px;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.9)}
  .pin.big{transform:rotate(-45deg) scale(1.5);z-index:1000}
  .leaflet-popup-content-wrapper{border-radius:13px;box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .leaflet-popup-content{margin:11px 13px 12px;font-family:inherit;min-width:158px;max-width:228px}
  .pop{cursor:pointer}
  .pop-name{font-size:1rem;font-weight:700;letter-spacing:-.02em;line-height:1.25;word-break:keep-all;white-space:normal;padding-right:16px}
  .pop-ko{font-size:.76rem;color:var(--ink-3);margin:2px 0 6px;line-height:1.3;word-break:keep-all}
  .pop-row{font-size:.82rem;color:var(--ink-2);margin-top:3px}
  .pop-row .star{color:#e8a317;font-weight:600}
  .pop-foot{display:flex;align-items:center;gap:7px;margin-top:10px}
  .pop-star{flex:none;display:inline-flex;align-items:center;gap:3px;border:1px solid var(--line-2);background:#fff;color:var(--ink-2);font-size:.78rem;font-weight:600;border-radius:999px;padding:5px 11px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .pop-star.on{background:#fff7e6;border-color:#f0c060;color:#c8860a}
  .pop-card-btn{flex:1;text-align:center;background:var(--blue);color:#fff;font-size:.82rem;font-weight:600;border:none;border-radius:999px;padding:6px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .pop-link{display:inline-block;margin-top:8px;font-size:.8rem;color:var(--ink-3);font-weight:500;text-decoration:none}
  .card.flash{animation:cardFlash 1.6s ease}
  @keyframes cardFlash{0%,100%{box-shadow:var(--shadow)}25%{box-shadow:0 0 0 3px var(--blue),0 10px 26px -8px rgba(0,113,227,.45)}}

  footer{text-align:center;padding:26px 20px 48px;color:var(--ink-3);font-size:.8rem;border-top:1px solid var(--line)}

  /* 맨 위로 버튼 */
  .to-top{
    position:fixed;right:16px;bottom:18px;z-index:60;
    width:44px;height:44px;border-radius:50%;border:none;
    background:var(--ink);color:#fff;font-size:1.25rem;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transform:translateY(8px);
    transition:opacity .25s,transform .25s;
  }
  .to-top.show{opacity:1;pointer-events:auto;transform:none}
  .to-top:active{transform:scale(.9)}

  @media(min-width:601px){
    #map{height:44vh;max-height:440px}
  }
</style>
</head>

/* ---------- Map + tile fallback ---------- */
const map = L.map('map',{zoomControl:true, scrollWheelZoom:false, attributionControl:true}).setView([45.4385,12.333],14);

const TILE_PROVIDERS = [
  {url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', opts:{subdomains:'abc', maxZoom:19, attribution:'&copy; OpenStreetMap'}},
  {url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', opts:{subdomains:'abcd', maxZoom:19, attribution:'&copy; OSM &copy; CARTO'}},
  {url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', opts:{maxZoom:19, attribution:'&copy; OpenStreetMap'}},
  {url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', opts:{subdomains:'abcd', maxZoom:19, attribution:'&copy; CARTO'}}
];
let providerIdx = 0, currentLayer = null, layerLoaded = false;
function loadTiles(){
  if(providerIdx >= TILE_PROVIDERS.length) return;
  const p = TILE_PROVIDERS[providerIdx];
  if(currentLayer) map.removeLayer(currentLayer);
  layerLoaded = false;
  currentLayer = L.tileLayer(p.url, p.opts);
  currentLayer.on('load', ()=>{ layerLoaded = true; });
  let errs = 0;
  currentLayer.on('tileerror', ()=>{
    errs++;
    if(!layerLoaded && errs >= 2 && providerIdx < TILE_PROVIDERS.length-1){
      providerIdx++;
      loadTiles();
    }
  });
  currentLayer.addTo(map);
}
loadTiles();
setTimeout(()=>{ if(!layerLoaded && providerIdx < TILE_PROVIDERS.length-1){ providerIdx++; loadTiles(); } }, 3500);

function pinIcon(color){
  return L.divIcon({className:'', iconSize:[19,19], iconAnchor:[9,19], popupAnchor:[0,-17],
    html:`<div class="pin" style="background:${color}"></div>`});
}
const markers = PLACES.map((p,i)=>{
  const m = L.marker([p.lat,p.lng],{icon:pinIcon(CATS[p.cat].color)});
  const priceTxt = p.price ? ` · ${'€'.repeat(p.price)}` : '';
  m.bindPopup(()=>popupHtml(p,i), {maxWidth:250, minWidth:160, autoPan:false});
  m._idx = i;
  return m;
});

function popupHtml(p,i){
  const priceTxt = p.price ? ` · ${'€'.repeat(p.price)}` : '';
  const on = isMP(p.name);
  const nm = p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<div class="pop" onclick="goToCard(${i})">
    <div class="pop-name">${p.name}</div>
    <div class="pop-ko">${p.ko}</div>
    <div class="pop-row"><span class="star">★ ${p.rating}</span> <span style="opacity:.6">(${p.count.toLocaleString()})</span>${priceTxt}</div>
    <div class="pop-row" style="color:${CATS[p.cat].color};font-weight:600">${CATS[p.cat].label}</div>
    <div class="pop-foot">
      <button class="pop-star${on?' on':''}" onclick="event.stopPropagation();popStar('${nm}',this)">${on?'★ 찜됨':'☆ 찜하기'}</button>
      <button class="pop-card-btn" onclick="event.stopPropagation();goToCard(${i})">카드 보기 ›</button>
    </div>
    <a class="pop-link" href="${p.gmap}" target="_blank" rel="noopener" onclick="event.stopPropagation()">구글지도에서 열기 ›</a>
  </div>`;
}
function goToCard(i){
  map.closePopup();
  let card = document.querySelector('.card[data-idx="'+i+'"]');
  if(!card){ setTab('all'); card = document.querySelector('.card[data-idx="'+i+'"]'); }
  if(card){
    card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
    setTimeout(()=>card.classList.remove('flash'), 1700);
  }
}
function popStar(name, btn){
  toggleMP(name);
  const on = isMP(name);
  btn.textContent = on ? '★ 찜됨' : '☆ 찜하기';
  btn.classList.toggle('on', on);
}

/* ---------- My Point 저장 (localStorage) ---------- */
const MP_KEY='venezia_mypoints';
let myPoints = (function(){ try{return new Set(JSON.parse(localStorage.getItem(MP_KEY)||'[]'))}catch(e){return new Set()} })();
let currentKey='all';
function saveMP(){ try{localStorage.setItem(MP_KEY,JSON.stringify([...myPoints]))}catch(e){} }
function isMP(name){ return myPoints.has(name); }
function inTab(p,key){
  if(key==="all") return true;
  if(key==="my") return myPoints.has(p.name);
  return p.cat===key || (p.extraCats && p.extraCats.includes(key));
}
function updateMyCount(){ const el=document.querySelector('.tab[data-key="my"] .count'); if(el) el.textContent=myPoints.size; }
function toggleMP(name){
  if(myPoints.has(name)) myPoints.delete(name); else myPoints.add(name);
  saveMP(); updateMyCount(); renderCards(currentKey);
  if(currentKey==='my') updateMap('my');
}

/* ---------- Tabs ---------- */
const tabDefs = [{key:"my",label:"별"},{key:"all",label:"전체"}]
  .concat(Object.keys(CATS).map(k=>({key:k,label:CATS[k].label})));
const tabsEl = document.getElementById('tabs');
tabDefs.forEach(t=>{
  let cnt;
  if(t.key==="all") cnt = PLACES.length;
  else if(t.key==="my") cnt = myPoints.size;
  else cnt = PLACES.filter(p=>inTab(p,t.key)).length;
  const color = t.key==="all" ? "#1d1d1f" : (t.key==="my" ? "#f0a500" : CATS[t.key].color);
  const b = document.createElement('button');
  b.className = 'tab'+(t.key==="all"?' active':'');
  b.dataset.key = t.key;
  b.style.setProperty('--tc', color);
  const labelHtml = t.key==="my" ? `<span class="tab-star">★</span>` : t.label;
  b.innerHTML = `${labelHtml}<span class="count">${cnt}</span>`;
  b.onclick = ()=>setTab(t.key);
  tabsEl.appendChild(b);
});

/* ---------- Legend ---------- */
document.getElementById('legend').innerHTML = Object.keys(CATS).map(k=>
  `<div class="lg"><i style="background:${CATS[k].color}"></i>${CATS[k].label}</div>`).join('');

/* ---------- Render ---------- */
const cardsEl = document.getElementById('cards');
const catTitle = document.getElementById('catTitle');
const catCnt = document.getElementById('catCnt');

function setTab(key){
  currentKey = key;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.key===key));
  catTitle.textContent = key==="all" ? "전체" : (key==="my" ? "별 목록" : CATS[key].label);
  renderCards(key);
  updateMap(key);
}

// 추천순 점수: 구글 평점 + 리뷰 수를 함께 반영 (베이즈 가중평균) — 리뷰 적은 고평점은 평균 쪽으로 보정
const RATING_C = PLACES.reduce((s,p)=>s+(p.rating||0),0) / PLACES.length;
const RATING_M = 300;
function recScore(p){
  const v = p.count||0, R = p.rating||0;
  return (v/(v+RATING_M))*R + (RATING_M/(v+RATING_M))*RATING_C;
}
function renderCards(key){
  const list = PLACES.map((p,i)=>({p,i})).filter(o=>inTab(o.p,key))
                     .sort((a,b)=>recScore(b.p)-recScore(a.p));
  catCnt.textContent = `${list.length}곳`;
  cardsEl.innerHTML = '';
  if(key==='my' && list.length===0){
    cardsEl.innerHTML = `<div class="empty-mp"><span class="big">☆</span>아직 담은 포인트가 없어요.<br>각 장소 카드의 별(☆) 버튼을 눌러<br>나만의 코스를 만들어 보세요.</div>`;
    return;
  }
  list.forEach((o,n)=>{
    const p = o.p;
    const priceTxt = p.price ? `<span class="sep">·</span><span class="price">${'€'.repeat(p.price)}</span>` : '';
    const pinFlag = p.pinflag ? `<span class="pin-flag">${p.pinflag}</span>` : '';
    const on = isMP(p.name);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(n*0.035,0.35)+'s';
    card.innerHTML = `
      <button class="star-btn${on?' on':''}" title="${on?'My Point에서 빼기':'My Point에 담기'}">${on?'★':'☆'}</button>
      <div class="thumb${p.img?'':' noimg'}" data-ch="${p.name[0]}">
        <span class="cat-tag"><i style="background:${CATS[p.cat].color}"></i>${CATS[p.cat].label}</span>
        ${pinFlag}
        ${p.img?`<img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.remove();this.parentElement.classList.add('noimg')">`:''}
      </div>
      <div class="body">
        <div class="name">${p.name}<span class="ko">${p.ko}</span></div>
        <div class="stat"><span class="star"><b>${p.rating}</b> ★</span><span class="sep">·</span><span>리뷰 ${p.count.toLocaleString()}</span>${priceTxt}</div>
        <div class="note">${p.note}</div>
        <div class="hours ${p.warn?'warn':''}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <span>${p.hours}</span>
        </div>
        <a class="gmap" href="${p.gmap}" target="_blank" rel="noopener" onclick="event.stopPropagation()">구글지도에서 열기 ›</a>
      </div>`;
    card.querySelector('.star-btn').onclick = (e)=>{ e.stopPropagation(); toggleMP(p.name); };
    card.dataset.idx = o.i;
    card.onclick = ()=>focusPlace(o.i);
    cardsEl.appendChild(card);
  });
}

function updateMap(key){
  const shown = [];
  markers.forEach((m,i)=>{
    const match = inTab(PLACES[i], key);
    if(match){ if(!map.hasLayer(m)) m.addTo(map); shown.push(m.getLatLng()); }
    else if(map.hasLayer(m)) map.removeLayer(m);
  });
  if(shown.length){
    map.flyToBounds(L.latLngBounds(shown), {padding:[45,45], maxZoom:16, duration:.55});
  }
}

// vertical screen position (px from map top) where the marker should sit so the popup, opening upward, stays fully visible with a top margin
function desiredMarkerY(){
  const h = map.getContainer().clientHeight;
  return Math.max(Math.min(12 + 17 + 250, h*0.9), h*0.55);
}
function centerPopup(popup){
  const ll = (popup && popup.getLatLng) ? popup.getLatLng() : (popup && popup._latlng);
  if(!ll) return;
  const p = map.latLngToContainerPoint(ll);
  const w = map.getContainer().clientWidth;
  map.panBy([Math.round(p.x - w/2), Math.round(p.y - desiredMarkerY())], {animate:true, duration:.35});
}
map.on('popupopen', e=>setTimeout(()=>centerPopup(e.popup), 60));

function focusPlace(i){
  const m = markers[i];
  if(!map.hasLayer(m)) m.addTo(map);
  document.querySelector('.sticky-top').scrollIntoView({behavior:'smooth',block:'start'});
  const z = Math.max(map.getZoom(), 16);
  map.setView(m.getLatLng(), z, {animate:false});                 // center the marker
  map.panBy([0, Math.round(map.latLngToContainerPoint(m.getLatLng()).y - desiredMarkerY())], {animate:true, duration:.45}); // drop it so popup fits above
  setTimeout(()=>m.openPopup(), 480);
  document.querySelectorAll('.pin').forEach(el=>el.classList.remove('big'));
  setTimeout(()=>{ const el=m.getElement()?.querySelector('.pin'); if(el) el.classList.add('big'); }, 560);
}

/* ---------- 내 위치 (실시간) ---------- */
let meMarker=null, meCircle=null, watching=false;
const LocateCtl = L.Control.extend({
  options:{position:'bottomright'},
  onAdd:function(){
    const b = L.DomUtil.create('button','locate-btn');
    b.innerHTML='<span class="pin-emoji">📍</span>';
    b.title='내 위치 표시';
    L.DomEvent.disableClickPropagation(b);
    L.DomEvent.on(b,'click',(e)=>{ L.DomEvent.stop(e); toggleLocate(); });
    return b;
  }
});
map.addControl(new LocateCtl());
function toggleLocate(){
  const btn=document.querySelector('.locate-btn');
  if(watching){ watching=false; map.stopLocate(); if(btn) btn.classList.remove('on'); return; }
  if(!('geolocation' in navigator)){ alert('이 브라우저는 위치 기능을 지원하지 않아요.'); return; }
  watching=true; if(btn) btn.classList.add('on');
  map.locate({watch:true, enableHighAccuracy:true});
}
map.on('locationfound', e=>{
  const ll=e.latlng, first=!meMarker;
  if(first){
    meMarker=L.marker(ll,{icon:L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],html:'<div class="me-dot"></div>'}),zIndexOffset:2000}).addTo(map);
    map.setView(ll,16);
  } else {
    meMarker.setLatLng(ll);
  }
});
map.on('locationerror', ()=>{
  watching=false;
  const btn=document.querySelector('.locate-btn'); if(btn) btn.classList.remove('on');
  alert('위치를 가져올 수 없어요.\n· HTTPS(또는 앱)로 접속했는지\n· 위치 권한을 허용했는지\n· 휴대폰 GPS가 켜져 있는지\n확인해 주세요.');
});

setTab('all');
const toTop=document.getElementById('toTop');
toTop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
window.addEventListener('scroll',()=>{ toTop.classList.toggle('show', window.scrollY>280); },{passive:true});
setTimeout(()=>map.invalidateSize(), 300);
window.addEventListener('resize', ()=>setTimeout(()=>map.invalidateSize(),150));
</script>
